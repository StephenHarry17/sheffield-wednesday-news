version: 1

frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - test -n "$DATABASE_URL" || (echo "DATABASE_URL missing in Amplify build env" && exit 1)
        - printf "DATABASE_URL=%s\n" "$DATABASE_URL" > .env.production
        - test -f .env.production || (echo ".env.production missing" && exit 1)
        - sed 's/=.*/=[REDACTED]/' .env.production
        - npx prisma generate
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*